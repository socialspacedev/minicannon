_schema: _schema
source: src
paths:
  uploads: img/
collections_config:
  posts:
    path: blog
    icon: post
    description: Blog posts about all things under the sun
    _enabled_editors:
      - content
      - visual
    _inputs:
      tags:
        type: multiselect
        options:
          allow_create: true
          empty_type: array
          values: data.taglist
        cascade: true
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    schemas:
      default:
        path: .cloudcannon/schemas/post.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: false
        icon: notes
      vinyl_vibes:
        path: .cloudcannon/schemas/vinyl-vibes-post.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: false
        icon: music_note
      photo_dump:
        path: .cloudcannon/schemas/photo-dump.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: false
        icon: photo_camera
      featured_music:
        path: .cloudcannon/schemas/featured-music-post.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: false
        icon: album
      a_certain_sound:
        path: .cloudcannon/schemas/a-certain-sound-post.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: false
        icon: radio
  pages:
    path: pages
    icon: article
    filter: strict
    description: Fascinating pages of this 'ere website
    _enabled_editors:
      - visual
      - content
    _inputs:
      keywords:
        type: multiselect
        options:
          allow_create: true
          empty_type: array
          values:
            - music
            - media
            - personal
          value_key:
        cascade: true
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    schemas:
      default:
        path: .cloudcannon/schemas/page.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: true
        remove_extra_inputs: false
        icon: notes
  data:
    path: _data
    icon: settings_applications
    disable_url: true
    description: Metadata for site layouts and other data
    _enabled_editors:
      - data
    disable_add: true
    disable_add_folder: true
    disable_file_actions: false
_enabled_editors:
  - visual
  - content
  - data
_inputs:
  music_featured:
    type: switch
    label: Feature on Music page
    comment: "Show this post in the curated Music page grid"
    cascade: true
  date:
    type: datetime
    instance_value: NOW
    cascade: true
  image_file:
    type: file
    options:
      resize_style: cover
    cascade: true
  layout:
    type: auto
    hidden: true
    cascade: true
  type:
    type: auto
    hidden: true
    cascade: true
  permalink:
    type: auto
    hidden: true
    cascade: true
  photos:
    type: array
    label: Photos
    cascade: true
  "photos[*].image_file":
    type: image
    label: Photo
    cascade: true
  "photos[*].alt":
    type: text
    label: Alt text
    cascade: true
  "photos[*].caption":
    type: text
    label: Caption
    cascade: true
  "photos[*].camera":
    type: select
    label: Camera
    options:
      values: data.camera
    cascade: true
  "photos[*].lens":
    type: select
    label: Lens
    options:
      values: data.lens
    cascade: true
  "photos[*].film":
    type: select
    label: Film
    options:
      values: data.film
    cascade: true
  "photos[*].iso":
    type: select
    label: ISO
    options:
      values: data.iso
    cascade: true
  a_certain_sound:
    type: object
    label: A Certain Sound episode
    cascade: true
  a_certain_sound.hero_image:
    type: image
    label: Hero image
    cascade: true
  a_certain_sound.hero_alt:
    type: text
    label: Hero image alt text
    cascade: true
  a_certain_sound.hero_caption:
    type: text
    label: Hero image caption
    cascade: true
  a_certain_sound.oar_url:
    type: url
    label: OAR on-demand URL (this episode)
    comment: "Optional — link to the episode's on-demand page on OAR"
    cascade: true
  a_certain_sound.tracks:
    type: array
    label: Tracks
    cascade: true
  "a_certain_sound.tracks[*].artist":
    type: text
    label: Artist
    cascade: true
  "a_certain_sound.tracks[*].title":
    type: text
    label: Song title
    cascade: true
  "a_certain_sound.tracks[*].year":
    type: number
    label: Year
    cascade: true
  "a_certain_sound.tracks[*].note":
    type: text
    label: Note
    comment: "Optional — short comment about the track"
    cascade: true
  vinyl_vibes:
    type: object
    label: Vinyl Vibes session
    cascade: true
  vinyl_vibes.hero_image:
    type: image
    label: Hero image
    cascade: true
  vinyl_vibes.hero_alt:
    type: text
    label: Hero image alt text
    cascade: true
  vinyl_vibes.hero_caption:
    type: text
    label: Hero image caption
    cascade: true
  vinyl_vibes.sets:
    type: array
    label: DJ sets
    cascade: true
  "vinyl_vibes.sets[*].dj":
    type: text
    label: DJ name
    cascade: true
  "vinyl_vibes.sets[*].slot":
    type: text
    label: Time slot
    cascade: true
  "vinyl_vibes.sets[*].tracks":
    type: array
    label: Tracks
    cascade: true
  "vinyl_vibes.sets[*].tracks[*].discogs":
    type: select
    label: Track (from Discogs collection)
    comment: "Search by artist or title. Picks fill artist, title, year, duration, and the Discogs link automatically at render time. Run `npm run discogs:sync` to refresh."
    options:
      values: data.discogs_picker
      value_key: value
      preview:
        text:
          - key: label
    cascade: true
  "vinyl_vibes.sets[*].tracks[*].youtube":
    type: text
    label: YouTube video ID (optional)
    comment: "11-character ID from the YouTube URL — adds an inline player. Leave blank for a clean row."
    cascade: true
  "vinyl_vibes.sets[*].tracks[*].artist":
    type: text
    label: Artist (override)
    comment: "Optional — only fill if Discogs is wrong or the track isn't in your collection."
    cascade: true
  "vinyl_vibes.sets[*].tracks[*].title":
    type: text
    label: Song title (override)
    comment: "Optional — only fill if Discogs is wrong or the track isn't in your collection."
    cascade: true
  "vinyl_vibes.sets[*].tracks[*].year":
    type: text
    label: Year (override)
    comment: "Optional — only fill if Discogs is wrong or missing the year. Leave blank to inherit the release year."
    cascade: true
  "vinyl_vibes.sets[*].tracks[*].duration":
    type: text
    label: Duration (override)
    comment: "e.g. 3:45 — Optional, only fill if Discogs is missing the duration."
    cascade: true
  "vinyl_vibes.sets[*].tracks[*].buy_url":
    type: url
    label: Discogs URL (override)
    comment: "Optional — only fill if you'd rather link somewhere other than the auto-derived Discogs release page (e.g., Bandcamp, label page)."
    cascade: true
_editables:
  text:
    allow_custom_markup: true
    remove_custom_markup: false
    bold: true
    italic: true
    redo: true
    removeformat: true
    underline: true
  block:
    allow_custom_markup: false
    remove_custom_markup: false
    blockquote: true
    bold: true
    bulletedlist: true
    code: true
    embed: true
    format: p h3
    horizontalrule: true
    image: true
    image_size_attributes: true
    italic: true
    numberedlist: true
    redo: true
    resize_style: contain
    snippet: true
    strike: true
    table: true
    underline: true
    undo: true
  content:
    allow_custom_markup: false
    remove_custom_markup: false
    blockquote: true
    bold: true
    bulletedlist: true
    center: align-center
    code: true
    copyformatting: true
    embed: true
    format: p h1 h2 h3 h4 h5 h6 pre address div
    horizontalrule: true
    image: true
    image_size_attributes: true
    indent: true
    italic: true
    justify: align-justify
    left: align-left
    link: true
    numberedlist: true
    outdent: true
    redo: true
    removeformat: true
    resize_style: contain
    right: align-right
    snippet: true
    strike: true
    styles: .cloudcannon/css/editor.css
    subscript: false
    superscript: false
    table: true
    underline: true
    undo: true
_snippets_imports:
  eleventy_liquid: true
_snippets:
  my_image_snippet:
    template: eleventy_liquid_shortcode_positional_args
    inline: false
    preview:
      text: Block image
    definitions:
      shortcode_name: image
      positional_args:
        - editor_key: Image
          type: string
        - editor_key: Alt
          type: string
    _inputs:
      Image:
        type: image
        cascade: true
      trim_bottom_left:
        type: auto
        hidden: true
        cascade: true
      trim_top_right:
        type: auto
        hidden: true
        cascade: true
      trim_bottom_right:
        type: auto
        hidden: true
        cascade: true
      trim_top_left:
        type: auto
        hidden: true
        cascade: true
      trim_left:
        type: auto
        hidden: true
        cascade: true
      trim_right:
        type: auto
        hidden: true
        cascade: true
  my_image_caption_snippet:
    template: eleventy_liquid_shortcode_positional_args
    inline: false
    preview:
      text: Block image with caption
    definitions:
      shortcode_name: image
      positional_args:
        - editor_key: Image
          type: string
        - editor_key: Alt
          type: string
        - editor_key: Caption
          type: string
    _inputs:
      Image:
        type: image
        cascade: true
      Caption:
        type: text
        cascade: true
      trim_bottom_left:
        type: auto
        hidden: true
        cascade: true
      trim_top_right:
        type: auto
        hidden: true
        cascade: true
      trim_bottom_right:
        type: auto
        hidden: true
        cascade: true
      trim_top_left:
        type: auto
        hidden: true
        cascade: true
      trim_left:
        type: auto
        hidden: true
        cascade: true
      trim_right:
        type: auto
        hidden: true
        cascade: true
  my_image_exif_snippet:
    template: eleventy_liquid_shortcode_positional_args
    inline: false
    preview:
      text: Block image with caption + EXIF
    definitions:
      shortcode_name: image
      positional_args:
        - editor_key: Image
          type: string
        - editor_key: Alt
          type: string
        - editor_key: Caption
          type: string
        - editor_key: Camera
          type: string
        - editor_key: Lens
          type: string
        - editor_key: Film
          type: string
        - editor_key: ISO
          type: string
    _inputs:
      Image:
        type: image
        cascade: true
      Caption:
        type: text
        cascade: true
      Camera:
        type: select
        options:
          values: data.camera
        cascade: true
      Lens:
        type: select
        options:
          values: data.lens
        cascade: true
      Film:
        type: select
        options:
          values: data.film
        cascade: true
      ISO:
        type: select
        options:
          values: data.iso
        cascade: true
      trim_bottom_left:
        type: auto
        hidden: true
        cascade: true
      trim_top_right:
        type: auto
        hidden: true
        cascade: true
      trim_bottom_right:
        type: auto
        hidden: true
        cascade: true
      trim_top_left:
        type: auto
        hidden: true
        cascade: true
      trim_left:
        type: auto
        hidden: true
        cascade: true
      trim_right:
        type: auto
        hidden: true
        cascade: true
  my_image_centered_snippet:
    template: eleventy_liquid_shortcode_positional_args
    inline: false
    preview:
      text: Centered image
    definitions:
      shortcode_name: image_centered
      positional_args:
        - editor_key: Image
          type: string
        - editor_key: Alt
          type: string
    _inputs:
      Image:
        type: image
        cascade: true
  my_youtube_snippet:
    template: eleventy_liquid_shortcode_positional_args
    inline: false
    preview:
      text: YouTube video
    definitions:
      shortcode_name: youtube
      positional_args:
        - editor_key: URL or ID
          type: string
    _inputs:
      "URL or ID":
        type: text
        label: YouTube URL or video ID
        comment: "Paste a full YouTube URL or the 11-character video ID"
        cascade: true
  my_bandcamp_snippet:
    template: eleventy_liquid_shortcode_positional_args
    inline: false
    preview:
      text: Bandcamp player
    definitions:
      shortcode_name: bandcamp
      positional_args:
        - editor_key: url
          type: string
    _inputs:
      url:
        type: url
        label: Bandcamp page URL
        comment: "Paste the Bandcamp album or track page URL — e.g. https://artist.bandcamp.com/album/title"
        cascade: true
  my_audio_snippet:
    template: eleventy_liquid_shortcode_positional_args
    inline: false
    preview:
      text: Audio player
    definitions:
      shortcode_name: audio
      positional_args:
        - editor_key: src
          type: string
        - editor_key: caption
          type: string
    _inputs:
      src:
        type: file
        label: Audio file
        comment: "Upload or pick an M4A / MP3 file (placed under src/audio/)"
        options:
          path: src/audio
        cascade: true
      caption:
        type: text
        label: Caption
        comment: "Optional caption shown below the player"
        cascade: true
data_config:
  camera:
    path: _data/camera.yaml
  lens:
    path: _data/lens.yaml
  film:
    path: _data/film.yaml
  iso:
    path: _data/iso.yaml
  taglist:
    path: _data/taglist.yaml
  discogs:
    path: _data/discogs.yaml
  discogs_picker:
    path: _data/discogs_picker.yaml
timezone: Pacific/Auckland
markdown:
  engine:
  options:
